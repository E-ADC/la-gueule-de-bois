name: Deploy VPS

# Se déclenche uniquement après un run CI réussi sur `main` (donc après que
# les tests backend/frontend soient passés) — jamais sur dev/preprod.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Déployer sur le VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git fetch origin main
            git checkout -B main origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          '
