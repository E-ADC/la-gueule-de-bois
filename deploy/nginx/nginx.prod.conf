# Config nginx pour le VPS uniquement (domaine + TLS Let's Encrypt).
# Utilisée via docker-compose.prod.yml, qui la monte par-dessus la config
# HTTP simple de base (deploy/nginx/nginx.conf, utilisée en local).
server {
    listen 80;
    server_name lagueueledebois.com www.lagueueledebois.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lagueueledebois.com www.lagueueledebois.com;

    ssl_certificate     /etc/letsencrypt/live/lagueueledebois.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lagueueledebois.com/privkey.pem;

    client_max_body_size 11m;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /data/uploads/;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
