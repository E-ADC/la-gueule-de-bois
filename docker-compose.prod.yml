# Override de production (VPS uniquement) : domaine + TLS Let's Encrypt.
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Ne pas utiliser en local — /etc/letsencrypt n'existe que sur le VPS
# (certificat émis par Certbot pour lagueueledebois.com).
services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
